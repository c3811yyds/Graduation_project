# 使用 docker-compose 统一编排前端、后端及数据库
version: '3.8'

services:
  # ------ 前端服务 ------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"        # 宿主机80端口映射到容器的80端口
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

  # ------ 后端服务 ------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"    # 宿主机5000端口映射到容器5000端口
    # 使用独立的 env_file 更安全、更优雅
    env_file:
      - ./backend/.env
    # environment:
    #  - FLASK_ENV=production
    #  - DATABASE_URL=mysql+pymysql://admin:yourpassword@db:3306/graduation_db
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  # ------ 数据库服务 (假如你没用云数据库，而是用本地的MySQL) ------
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=caching_sha2_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: graduation_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      # 持久化数据
      - db_data:/var/lib/mysql
      # 如果你有初创的SQL脚本 (比如 database_seed.sql) 想自动执行建表
      - ./database_seed.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

# 定义网络
networks:
  app-network:
    driver: bridge

# 定义数据卷
volumes:
  db_data: