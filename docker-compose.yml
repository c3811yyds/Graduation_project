# 使用 docker compose 统一编排前端、后端及数据库
services:
  # ------ 前端服务 ------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"        # 宿主机80端口映射到容器的80端口
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

  # ------ 后端服务 ------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"    # 宿主机5000端口映射到容器5000端口
    # 使用独立的 env_file 更安全、更优雅
    env_file:
      - ./backend/.env
    # environment:
    #  - FLASK_ENV=production
    #  - DATABASE_URL=mysql+pymysql://admin:yourpassword@db:3306/graduation_project?charset=utf8mb4
    depends_on:
      - db
    volumes:
      # 持久化课件上传目录，避免容器重建后文件丢失
      - backend_storage:/app/backend/storage
    networks:
      - app-network
    restart: always

  # ------ 数据库服务 (假如你没用云数据库，而是用本地的MySQL) ------
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=caching_sha2_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: graduation_project
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      # 持久化数据
      - db_data:/var/lib/mysql
      # db-backups/database_seed.sql 只会在空库首次初始化时自动执行；日常 SQL 备份建议手动导出到项目根目录 db-backups/ 或服务器 /root/db-backups/
      - ./db-backups/database_seed.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

# 定义网络
networks:
  app-network:
    driver: bridge

# 定义数据卷
volumes:
  db_data:
  backend_storage:
